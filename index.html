<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BruxBrix - Gaming Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Press Start 2P', cursive; }
        body { background-color:#121212; color:#fff; }
        a { text-decoration:none; color:inherit; }

        nav { display:flex; justify-content:space-between; align-items:center; padding:1rem 2rem; background:#1f1f1f; border-bottom:2px solid #ff4d6d; }
        .logo { font-size:1.5rem; color:#ff4d6d; }
        nav ul { display:flex; list-style:none; gap:1.5rem; }
        nav ul li:hover { color:#ff4d6d; cursor:pointer; }

        .hero { display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; height:80vh; background:linear-gradient(135deg,#ff4d6d,#6d5aff); }
        .hero h1 { font-size:3rem; margin-bottom:1rem; }
        .hero p { font-size:1.2rem; max-width:600px; }
        .hero button { margin-top:2rem; padding:1rem 2rem; background:#121212; color:#ff4d6d; border:2px solid #ff4d6d; font-size:1rem; cursor:pointer; transition:0.3s; }
        .hero button:hover { background:#ff4d6d; color:#121212; }

        .games { padding:4rem 2rem; text-align:center; }
        .games h2 { font-size:2rem; margin-bottom:2rem; color:#ff4d6d; }
        .game-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:2rem; }
        .game-card { background:#1f1f1f; padding:1rem; border:2px solid #ff4d6d; border-radius:10px; transition:transform 0.2s; cursor:pointer; }
        .game-card:hover { transform:scale(1.05); }

        footer { background:#1f1f1f; text-align:center; padding:2rem; border-top:2px solid #ff4d6d; }

        /* Canvas Game Modal */
        #gameModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); justify-content:center; align-items:center; z-index:100; }
        #gameCanvas { background:#222; border:4px solid #ff4d6d; display:block; margin:auto; }
        #closeGame { position:absolute; top:20px; right:40px; font-size:2rem; color:#ff4d6d; cursor:pointer; }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav>
        <div class="logo">BruxBrix</div>
        <ul>
            <li>Home</li>
            <li>Games</li>
            <li>Leaderboard</li>
            <li>Community</li>
            <li>About</li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <h1>Welcome to BruxBrix</h1>
        <p>Your ultimate online gaming hub. Play, compete, and join the community!</p>
        <button id="playBtn">Play Now</button>
    </section>

    <!-- Games Section -->
    <section class="games">
        <h2>Featured Games</h2>
        <div class="game-grid">
            <div class="game-card">Game 1</div>
            <div class="game-card">Game 2</div>
            <div class="game-card">Game 3</div>
            <div class="game-card">Game 4</div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        &copy; 2026 BruxBrix. All Rights Reserved.
    </footer>

    <!-- Game Modal -->
    <div id="gameModal">
        <span id="closeGame">&times;</span>
        <canvas id="gameCanvas" width="400" height="500"></canvas>
    </div>

    <script>
        // Open Game Modal
        const playBtn = document.getElementById('playBtn');
        const gameModal = document.getElementById('gameModal');
        const closeGame = document.getElementById('closeGame');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        playBtn.addEventListener('click', () => {
            gameModal.style.display = 'flex';
            startGame();
        });
        closeGame.addEventListener('click', () => {
            gameModal.style.display = 'none';
            cancelAnimationFrame(animationId);
        });

        // Simple Falling Blocks Game
        let player = { x:180, y:450, width:40, height:40, speed:5 };
        let blocks = [];
        let animationId;
        function startGame() {
            blocks = [];
            player.x = 180;
            let spawnTimer = 0;

            function gameLoop() {
                ctx.clearRect(0,0,canvas.width,canvas.height);

                // Spawn blocks
                spawnTimer++;
                if(spawnTimer % 50 === 0) {
                    let size = 30;
                    blocks.push({ x:Math.random()*(canvas.width-size), y:-size, width:size, height:size, speed:2+Math.random()*3 });
                }

                // Draw blocks
                for(let i=blocks.length-1;i>=0;i--) {
                    let b = blocks[i];
                    b.y += b.speed;
                    ctx.fillStyle = '#ff4d6d';
                    ctx.fillRect(b.x,b.y,b.width,b.height);

                    // Collision
                    if(b.x < player.x + player.width &&
                       b.x + b.width > player.x &&
                       b.y < player.y + player.height &&
                       b.height + b.y > player.y) {
                        alert('Game Over!');
                        blocks = [];
                        return;
                    }

                    if(b.y > canvas.height) blocks.splice(i,1);
                }

                // Draw player
                ctx.fillStyle = '#6d5aff';
                ctx.fillRect(player.x,player.y,player.width,player.height);

                animationId = requestAnimationFrame(gameLoop);
            }

            gameLoop();
        }

        // Player controls
        document.addEventListener('keydown', e => {
            if(e.key === 'ArrowLeft') player.x -= player.speed;
            if(e.key === 'ArrowRight') player.x += player.speed;
            if(player.x < 0) player.x = 0;
            if(player.x + player.width > canvas.width) player.x = canvas.width - player.width;
        });
    </script>

</body>
</html>
